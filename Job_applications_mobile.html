function ymd(s) { return s ? String(s).slice(0,10) : ''; }
function effectiveStatus(j) {
  if (j.status_manual) return j.status_manual;
  if (j.status_auto)   return j.status_auto;
  const cls = j.last_email?.classification;
  if (cls === 'Auto_ack') return 'Applied';
  if (cls === 'Interview') return 'Interview';
  if (cls === 'Offer') return 'Offer';
  if (cls === 'Rejected') return 'Rejected';
  return 'New';

function eventDate(j) {
  return ymd(j.last_email?.date) || ymd(j.scraped_at) || ymd(j.date) || '';
}

function visibleJobs() {
  const from = $('from').value;
  const to   = $('to').value;
  return JOBS.filter(j => {
    const d = eventDate(j);
    if (from && d && d < from) return false;
    if (to   && d && d > to)   return false;
    if ((from || to) && !d) return false;
    return true;
  });
}

function renderStats() {
  const all = visibleJobs();
  const c = { New: 0, Applied: 0, Interview: 0, Offer: 0, Rejected: 0 };
  for (const j of all) {
    const s = effectiveStatus(j);
    if (c[s] !== undefined) c[s]++;
  }
  $('stats').innerHTML = `
    <div class="stat"><b>${all.length}</b>Total</div>
    <div class="stat"><b>${c.New}</b>New</div>
    <div class="stat"><b>${c.Applied}</b>Applied</div>
    <div class="stat"><b>${c.Interview}</b>Interview</div>
    <div class="stat"><b>${c.Offer}</b>Offer</div>
  `;
}

function renderJobs() {
  const list = visibleJobs().slice().sort((a,b) => (eventDate(b) || '').localeCompare(eventDate(a) || ''));
  $('job-count').textContent = list.length;
  const host = $('jobs');
  const empty = $('empty');
  if (list.length === 0) { host.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  host.innerHTML = list.map(j => {
    const status = effectiveStatus(j);
    const src = (j.source || '').toLowerCase();
    return `
      <div class="job">
        <div class="title">${escape(j.position || '(no position)')}</div>
        <div class="company">${escape(j.company || '')}</div>
        <div class="meta">
          <span class="pill ${src}">${escape(j.source || '—')}</span>
          <span class="pill ${status.toLowerCase()}">${status}</span>
          ${j.location ? `<span>📍 ${escape(j.location)}</span>` : ''}
          ${eventDate(j) ? `<span>· ${eventDate(j)}</span>` : ''}
          ${j.link ? `<a class="link" href="${escape(j.link)}" target="_blank" rel="noopener">Open ↗</a>` : ''}
        </div>
      </div>`;
  }).join('');
}

function escape(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

}
function bucketKey(d, b) {
  if (b === 'day')   return d;
  if (b === 'month') return d.slice(0,7);
  if (b === 'week') {
    const dt = new Date(d + 'T00:00:00Z');
    const day = dt.getUTCDay() || 7;
    dt.setUTCDate(dt.getUTCDate() - (day - 1));
    return dt.toISOString().slice(0,10);
  }
}
function nextKey(k, b) {
  if (b === 'day') {
    const d = new Date(k + 'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+1);
    return d.toISOString().slice(0,10);
  }
  if (b === 'week') {
    const d = new Date(k + 'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+7);
    return d.toISOString().slice(0,10);
  }
  if (b === 'month') {
    const [y, m] = k.split('-').map(Number);
    return new Date(Date.UTC(y, m, 1)).toISOString().slice(0,7);
  }
}
let chart = null;
function drawChart() {
  const dates = chartDates();
  const counts = new Map();
  for (const d of dates) {
    const k = bucketKey(d, bucket);
    counts.set(k, (counts.get(k) || 0) + 1);
  }
  const keys = [...counts.keys()].sort();
  const labels = [], data = [];
  if (keys.length > 0) {
    let cur = keys[0], last = keys[keys.length-1], i = 0;
    while (cur <= last && i < 1000) {
      labels.push(cur);
      data.push(counts.get(cur) || 0);
      cur = nextKey(cur, bucket);
      i++;
    }
  }
  const ctx = $('chart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{
      label: 'Applications',
      data,
      backgroundColor: 'rgba(74,158,255,0.5)',
      borderColor: 'rgba(74,158,255,1)',
      borderWidth: 1, borderRadius: 3,
    }]},
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7785', maxRotation: 0, autoSkip: true } },
        y: { beginAtZero: true, ticks: { color: '#6b7785', precision: 0 } },
      },
    },
  });
}

  const t = $('toast');

  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}
